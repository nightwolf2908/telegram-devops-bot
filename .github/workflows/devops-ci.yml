name: DevOps Bot CI Pipeline

# El pipeline se activará cada vez que hagas un "push" a la rama main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Usaremos un servidor virtual con la última versión de Ubuntu Linux
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio en el servidor virtual
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Instalar Python en el servidor virtual
    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # Paso 3: Instalar las dependencias de nuestro proyecto
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Validar la sintaxis del código (Linting básico)
    # Esto revisa si hay errores de dedo, variables mal declaradas o fallas de compilación
    - name: Verificar errores de sintaxis en Python
      run: |
        python -m compileall .

    # 5. Simular una verificación usando el Secreto de GitHub
    # Aquí mapeamos el secreto de GitHub a una variable de entorno del servidor
    - name: Validar carga de credenciales de seguridad
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      run: |
        if [ -z "$TELEGRAM_TOKEN" ]; then
          echo "❌ Error: El secreto TELEGRAM_TOKEN no está configurado en GitHub."
          exit 1
        else
          echo "✅ Éxito: Las variables de entorno de seguridad se cargaron correctamente en el entorno de CI."
        fi